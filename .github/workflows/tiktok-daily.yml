name: TikTok daily DM

on:
  push:
    branches:
      - main
  schedule:
    # GitHub Actions cron always runs in UTC.
    # 18:00 UTC ≈ 6 PM in UTC; adjust for your timezone, e.g.:
    #   6 PM US Eastern (EST):  '0 23 * * *'
    #   6 PM US Eastern (EDT):  '0 22 * * *'
    #   6 PM Asia/Jakarta:      '0 11 * * *'
    - cron: "30 2 * * *"
  workflow_dispatch:

concurrency:
  group: tiktok-daily
  cancel-in-progress: false

jobs:
  send-daily-reel:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TIKTOK_USERNAME: ${{ secrets.TIKTOK_USERNAME }}
      TIKTOK_PASSWORD: ${{ secrets.TIKTOK_PASSWORD }}
      TIKTOK_FRIEND_USERNAME: ${{ secrets.TIKTOK_FRIEND_USERNAME }}
      TZ: ${{ vars.TZ || 'UTC' }}
      HEADLESS: "true"
      USER_DATA_DIR: ./.browser-data

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Restore browser session
        uses: actions/cache@v4
        with:
          path: .browser-data
          key: tiktok-browser-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            tiktok-browser-${{ runner.os }}-

      - name: Build
        run: npm run build

      - name: Run daily workflow
        run: npm run run-once

      - name: Upload debug artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: browser-session-debug
          path: .browser-data/
          retention-days: 3
